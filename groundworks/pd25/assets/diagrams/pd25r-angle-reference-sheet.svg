<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1400 520" role="img" aria-labelledby="pd25-angles-title">
  <title id="pd25-angles-title">Vermeer PD25R reference angles</title>

  <rect width="1400" height="520" fill="#eef0f3"/>

  <rect x="0" y="0" width="1400" height="56" fill="#005f9e"/>
  <text x="24" y="36" fill="#fff" font-family="'Open Sans', Arial, sans-serif" font-size="18" font-weight="700">
    PD25R reference angles - engine side, front-left, front-right
  </text>

  <g font-family="'Open Sans', Arial, sans-serif">
    <rect x="24" y="72" width="432" height="420" rx="8" fill="#fff" stroke="#d1d5db"/>
    <image xlink:href="pd25r-angle-rear-left.png" x="32" y="100" width="416" height="364" preserveAspectRatio="xMidYMid meet"/>
    <text x="240" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#005f9e">Engine side (hotspot map)</text>

    <rect x="484" y="72" width="432" height="420" rx="8" fill="#fff" stroke="#d1d5db"/>
    <image xlink:href="pd25r-angle-front-left.png" x="492" y="100" width="416" height="364" preserveAspectRatio="xMidYMid meet"/>
    <text x="700" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#252a2e">Front-left (mast / grill)</text>

    <rect x="944" y="72" width="432" height="420" rx="8" fill="#fff" stroke="#d1d5db"/>
    <image xlink:href="pd25r-angle-front-right.png" x="952" y="100" width="416" height="364" preserveAspectRatio="xMidYMid meet"/>
    <text x="1160" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#252a2e">Front-right (mast / hammer)</text>
  </g>
</svg>
