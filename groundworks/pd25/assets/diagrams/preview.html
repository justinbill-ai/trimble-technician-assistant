<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PD25R diagram preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Open Sans", sans-serif; margin: 24px; background: #f4f5f7; color: #252a2e; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; color: #4b5563; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .tabs button { padding: 8px 14px; border: 1px solid #9ca3af; background: #fff; border-radius: 6px; cursor: pointer; font-family: "Open Sans", sans-serif; }
    .tabs button.active { background: #005f9e; color: #fff; border-color: #005f9e; }
    .frame { background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px; overflow: auto; }
    .frame object, .frame img { display: block; max-width: 100%; height: auto; margin: 0 auto; }
    .note { margin-top: 16px; font-size: 0.9rem; color: #4b5563; }
  </style>
</head>
<body>
  <h1>Vermeer PD25R - diagram preview</h1>
  <p>Target map uses <strong>engine-side (rear-left)</strong> photo. Open from the <code>diagrams</code> folder.</p>

  <div class="tabs">
    <button type="button" class="active" data-target="target-guides">Target pin guide</button>
    <button type="button" data-target="angles">All angles sheet</button>
    <button type="button" data-target="rear-left">Engine side (primary)</button>
    <button type="button" data-target="front-left">Front-left</button>
    <button type="button" data-target="front-right">Front-right</button>
    <button type="button" data-target="target-base">Target overview SVG</button>
  </div>

  <div class="frame" id="target-guides">
    <object data="pd25r-target-overview-guides.svg" type="image/svg+xml" width="920" height="1040">Target guide failed to load.</object>
  </div>
  <div class="frame" id="angles" hidden>
    <object data="pd25r-angle-reference-sheet.svg" type="image/svg+xml" width="1400" height="520">Angle sheet failed to load.</object>
  </div>
  <div class="frame" id="rear-left" hidden>
    <img src="pd25r-angle-rear-left.png" alt="PD25R engine-side view" width="680" />
  </div>
  <div class="frame" id="front-left" hidden>
    <img src="pd25r-angle-front-left.png" alt="PD25R front-left view" width="683" />
  </div>
  <div class="frame" id="front-right" hidden>
    <img src="pd25r-angle-front-right.png" alt="PD25R front-right view" width="683" />
  </div>
  <div class="frame" id="target-base" hidden>
    <object data="pd25r-target-overview-base.svg" type="image/svg+xml" width="920" height="1040">Target overview failed to load.</object>
  </div>

  <p class="note">
    Calculator hotspot map: <code>pd25r-angle-rear-left.png</code>.
    Interim detail views use front-right (mast) and rear-left (antennas).
  </p>

  <script>
    document.querySelectorAll('.tabs button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tabs button').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        ['target-guides', 'angles', 'rear-left', 'front-left', 'front-right', 'target-base'].forEach(function (id) {
          document.getElementById(id).hidden = id !== btn.getAttribute('data-target');
        });
      });
    });
  </script>
</body>
</html>
