<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 683 911" role="img" aria-labelledby="pd25r-overlay-title">
  <title id="pd25r-overlay-title">Vermeer PD25R  photo-aligned hotspot overlay</title>

  <defs>
    <style>
      .zone { stroke: #fff; stroke-width: 1.5; stroke-linejoin: round; fill-opacity: 0.42; }
      .zone--track { fill: #1c1c1c; }
      .zone--yellow { fill: #f0b323; }
      .zone--black { fill: #1a1a1a; }
      .zone--grey { fill: #9ca3af; }
      .zone--silver { fill: #c0c4cc; }
      .zone--green { fill: #1f6b3a; }
      .zone--red { fill: #c41e3a; }
      .zone--ref { fill: #005f9e; fill-opacity: 0.55; stroke: #fff; stroke-width: 2; stroke-dasharray: 4 2; }
      .hotspot-mode .zone { cursor: pointer; }
      .hotspot-mode .zone:hover { fill-opacity: 0.65; stroke: #005f9e; stroke-width: 2.5; }
    </style>
    <pattern id="hazard-stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="8" height="8" fill="#f0b323"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#111" stroke-width="3.5"/>
    </pattern>
    <pattern id="mesh-vent" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#f0b323"/>
      <path d="M0 0 L6 6 M6 0 L0 6" stroke="#111" stroke-width="0.6" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Reference photograph -->
  <image id="reference-photo" xlink:href="pd25r-reference.png" x="0" y="0" width="683" height="911" preserveAspectRatio="xMidYMid meet"/>

  <g id="pd25r-hotspots" aria-label="Color-bounded hotspot regions">

    <!-- UNDER CARRIAGE -->
    <path id="track-front" class="zone zone--track" data-component="Front crawler track" data-color="black"
          d="M 18 798 L 52 788 L 248 772 L 278 778 L 286 808 L 258 832 L 42 848 L 14 826 Z"/>

    <path id="track-rear" class="zone zone--track" data-component="Rear crawler track" data-color="black"
          d="M 288 778 L 398 768 L 648 778 L 672 798 L 678 828 L 648 848 L 285 838 L 278 808 Z"/>

    <path id="body-bottom-trim" class="zone zone--black" data-component="Chassis bottom trim" data-color="black"
          d="M 168 752 L 662 752 L 662 772 L 168 772 Z"/>

    <!-- CHASSIS -->
    <path id="body-main" class="zone zone--yellow" data-component="Main chassis body" data-color="yellow"
          d="M 172 752 L 172 698 L 218 682 L 228 578 L 248 552 L 548 528 L 568 542 L 572 752 Z"/>

    <path id="body-deck" class="zone zone--yellow" data-component="Sloped engine deck" data-color="yellow"
          d="M 248 552 L 548 528 L 538 502 L 298 518 L 248 538 Z"/>

    <path id="body-rear-cover" class="zone zone--black" data-component="Rear engine cover" data-color="black"
          d="M 568 542 L 662 548 L 662 752 L 572 752 Z"/>

    <path id="control-panel" class="zone zone--black" data-component="Operator control panel" data-color="black"
          d="M 172 698 L 172 612 L 208 598 L 228 602 L 228 682 Z"/>

    <rect id="control-screen" class="zone zone--grey" data-component="Control display" data-color="grey"
          x="178" y="628" width="28" height="22" rx="1"/>

    <circle id="control-estop" class="zone zone--red" data-component="Emergency stop" data-color="red"
            cx="194" cy="662" r="6"/>

    <rect id="vent-lower" class="zone" data-component="Engine vent  lower" data-color="yellow-mesh"
          x="388" y="638" width="58" height="36" rx="1" fill="url(#mesh-vent)"/>

    <rect id="vent-upper" class="zone" data-component="Engine vent  upper" data-color="yellow-mesh"
          x="388" y="578" width="58" height="36" rx="1" fill="url(#mesh-vent)"/>

    <path id="decal-hazard-stripes" class="zone" data-component="Hazard stripe decal" data-color="black-yellow"
          fill="url(#hazard-stripes)" fill-opacity="0.55"
          d="M 248 718 L 548 718 L 548 742 L 248 742 Z"/>

    <rect id="decal-pd25r" class="zone zone--green" data-component="PD25R model badge" data-color="green"
          x="448" y="698" width="44" height="18" rx="1"/>

    <path id="roof-beacon" class="zone zone--black" data-component="Roof beacon / antenna" data-color="black"
          d="M 328 502 L 336 502 L 338 472 L 342 468 L 342 458 L 322 458 L 322 468 L 326 472 Z"/>

    <!-- Survey reference zones -->
    <path id="antenna-mb" class="zone zone--ref" data-component="Moving Base antenna (MB)" data-survey="MB"
          d="M 278 508 L 298 506 L 302 482 L 282 484 Z"/>

    <path id="antenna-h" class="zone zone--ref" data-component="Heading antenna (H)" data-survey="H"
          d="M 518 518 L 538 516 L 542 492 L 522 494 Z"/>

    <!-- MAST -->
    <path id="mast-foot-frame" class="zone zone--yellow" data-component="Mast foot frame" data-color="yellow"
          d="M 158 752 L 158 698 L 188 688 L 228 682 L 228 752 Z"/>

    <rect id="mast-foot-mf" class="zone zone--ref" data-component="Mast foot reference (MF)" data-survey="MF"
          x="178" y="728" width="32" height="14" rx="1"/>

    <path id="mast-support-lower" class="zone zone--yellow" data-component="Mast support arm  lower" data-color="yellow"
          d="M 188 688 L 202 648 L 218 652 L 228 578 L 248 552 L 238 552 L 224 622 L 208 626 Z"/>

    <path id="mast-support-upper" class="zone zone--yellow" data-component="Mast support arm  upper" data-color="yellow"
          d="M 202 648 L 238 512 L 252 516 L 218 652 Z"/>

    <path id="mast-rail-left" class="zone zone--yellow" data-component="Mast rail  left" data-color="yellow"
          d="M 178 168 L 192 168 L 198 688 L 184 688 Z"/>

    <path id="mast-rail-right" class="zone zone--yellow" data-component="Mast rail  right" data-color="yellow"
          d="M 212 168 L 226 168 L 220 688 L 206 688 Z"/>

    <path id="mast-rail-center" class="zone zone--black" data-component="Mast center rail" data-color="black"
          d="M 192 162 L 206 162 L 206 692 L 192 692 Z"/>

    <rect id="mast-chain" class="zone zone--silver" data-component="Mast drive chain" data-color="silver"
          x="195" y="178" width="8" height="500" rx="0.5"/>

    <circle id="mast-pivot-ml" class="zone zone--ref" data-component="Mast left pivot (ML)" data-survey="ML"
            cx="186" cy="668" r="9"/>

    <circle id="mast-pivot-mr" class="zone zone--ref" data-component="Mast right pivot (MR)" data-survey="MR"
            cx="218" cy="668" r="9"/>

    <path id="hammer-head" class="zone zone--yellow" data-component="Hammer drive head" data-color="yellow"
          d="M 158 418 L 172 368 L 198 358 L 228 368 L 242 408 L 242 468 L 228 498 L 198 502 L 172 492 L 158 448 Z"/>

    <circle id="hammer-center-hc" class="zone zone--ref" data-component="Hammer center (HC)" data-survey="HC"
            cx="200" cy="428" r="11"/>

    <rect id="hammer-face-plate" class="zone zone--silver" data-component="Hammer face plate" data-color="silver"
          x="160" y="408" width="12" height="34" rx="0.5"/>

    <rect id="guide-strip-red" class="zone zone--red" data-component="Alignment guide strip" data-color="red"
          x="242" y="392" width="5" height="58" rx="0.5"/>

    <!-- HYDRAULICS -->
    <path id="hydraulic-cylinder-upper" class="zone zone--yellow" data-component="Hydraulic cylinder  upper" data-color="yellow"
          d="M 242 468 L 318 492 L 324 504 L 248 482 Z"/>

    <path id="hydraulic-rod-upper" class="zone zone--silver" data-component="Hydraulic rod  upper" data-color="silver"
          d="M 248 482 L 324 504 L 322 510 L 246 488 Z"/>

    <path id="hydraulic-cylinder-lower" class="zone zone--yellow" data-component="Hydraulic cylinder  lower" data-color="yellow"
          d="M 228 578 L 338 618 L 344 632 L 234 598 Z"/>

    <path id="hydraulic-rod-lower" class="zone zone--silver" data-component="Hydraulic rod  lower" data-color="silver"
          d="M 234 598 L 344 632 L 342 638 L 232 604 Z"/>

    <path id="hose-bundle-1" class="zone" data-component="Hydraulic hoses  upper" data-color="black"
          fill="none" stroke="#111" stroke-width="6" stroke-linecap="round" opacity="0.65"
          d="M 242 408 Q 288 392 318 452 Q 332 478 338 498"/>

    <path id="hose-bundle-2" class="zone" data-component="Hydraulic hoses  lower" data-color="black"
          fill="none" stroke="#111" stroke-width="6" stroke-linecap="round" opacity="0.65"
          d="M 242 448 Q 298 462 338 528 Q 352 548 358 562"/>
  </g>
</svg>
