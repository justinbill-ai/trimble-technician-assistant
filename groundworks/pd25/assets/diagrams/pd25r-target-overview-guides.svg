<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 920 1040" role="img" aria-labelledby="pd25-guide-title">
  <title id="pd25-guide-title">Vermeer PD25R target position guide</title>

  <defs>
    <linearGradient id="photo-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.04"/>
      <stop offset="88%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="soft-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="1040" fill="#eef0f3"/>

  <rect x="0" y="0" width="920" height="76" fill="#005f9e"/>
  <text x="24" y="34" fill="#fff" font-family="'Open Sans', Arial, sans-serif" font-size="20" font-weight="700">
    PD25R - Target Pin Guide (engine side)
  </text>
  <text x="24" y="58" fill="#cce4f3" font-family="'Open Sans', Arial, sans-serif" font-size="13">
    Dashed circles = suggested hotspot centers on rear-left photo
  </text>

  <g filter="url(#soft-shadow)">
    <rect x="108" y="92" width="704" height="940" rx="8" fill="#fff"/>
    <image xlink:href="pd25r-angle-rear-left.png" x="116" y="100" width="688" height="924" preserveAspectRatio="xMidYMid meet"/>
    <rect x="116" y="100" width="688" height="924" fill="url(#photo-fade)"/>
  </g>

  <!-- Image 680x907 mapped into 688x924 at offset 116,100 -->
  <g id="target-guides" font-family="'Open Sans', Arial, sans-serif">
    <g id="guide-H" transform="translate(464.2, 252.3)">
      <circle r="20" fill="none" stroke="#005f9e" stroke-width="2" stroke-dasharray="5 3"/>
      <circle r="4" fill="#005f9e"/>
      <text y="-26" text-anchor="middle" font-size="12" font-weight="700" fill="#005f9e">H</text>
    </g>
    <g id="guide-MB" transform="translate(513.2, 247.8)">
      <circle r="20" fill="none" stroke="#005f9e" stroke-width="2" stroke-dasharray="5 3"/>
      <circle r="4" fill="#005f9e"/>
      <text y="-26" text-anchor="middle" font-size="12" font-weight="700" fill="#005f9e">MB</text>
    </g>
    <g id="guide-HC" transform="translate(627.0, 385.2)">
      <circle r="20" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="5 3"/>
      <circle r="4" fill="#6b7280"/>
      <text y="-26" text-anchor="middle" font-size="12" font-weight="700" fill="#6b7280">HC</text>
    </g>
    <g id="guide-ML" transform="translate(507.4, 638.6)">
      <circle r="20" fill="none" stroke="#005f9e" stroke-width="2" stroke-dasharray="5 3"/>
      <circle r="4" fill="#005f9e"/>
      <text y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#005f9e">ML</text>
    </g>
    <g id="guide-MR" transform="translate(545.8, 638.6)">
      <circle r="20" fill="none" stroke="#005f9e" stroke-width="2" stroke-dasharray="5 3"/>
      <circle r="4" fill="#005f9e"/>
      <text y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#005f9e">MR</text>
    </g>
    <g id="guide-MF" transform="translate(535.8, 767.4)">
      <circle r="20" fill="none" stroke="#005f9e" stroke-width="2" stroke-dasharray="5 3"/>
      <circle r="4" fill="#005f9e"/>
      <text y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#005f9e">MF</text>
    </g>
  </g>

  <rect x="108" y="972" width="704" height="52" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="124" y="996" fill="#252a2e" font-family="'Open Sans', Arial, sans-serif" font-size="12" font-weight="600">
    Refine pin % in target-placement-data.js after you place final icon artwork
  </text>
  <text x="124" y="1014" fill="#4b5563" font-family="'Open Sans', Arial, sans-serif" font-size="11">
    HC optional. Replace interim detail photos with close-up shots when available.
  </text>
</svg>
