<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-labelledby="pd25r-title pd25r-desc">
  <title id="pd25r-title">Vermeer PD25R  side view hotspot regions</title>
  <desc id="pd25r-desc">Color-bounded regions for interactive callouts on the PD25R pile driver side profile.</desc>

  <defs>
    <style>
      .zone { stroke: #111; stroke-width: 2; stroke-linejoin: round; }
      .zone--track { fill: #1c1c1c; }
      .zone--yellow { fill: #f0b323; }
      .zone--black { fill: #1a1a1a; }
      .zone--grey { fill: #6b7280; }
      .zone--silver { fill: #9ca3af; }
      .zone--green { fill: #1f6b3a; }
      .zone--red { fill: #c41e3a; }
      .zone--hose { fill: #111; }
      .zone--mesh { fill: #d4a017; stroke: #111; stroke-width: 1.5; }
      .zone--stripe { fill: #111; }
      .zone-label {
        font: 600 11px 'Open Sans', Arial, sans-serif;
        fill: #fff;
        pointer-events: none;
        text-anchor: middle;
      }
      .zone-label--dark { fill: #111; }
      .title-text {
        font: 700 18px 'Open Sans', Arial, sans-serif;
        fill: #252a2e;
      }
      .subtitle-text {
        font: 400 12px 'Open Sans', Arial, sans-serif;
        fill: #4b5563;
      }
      /* Hotspot interaction  enable in app via class on svg root */
      .hotspot-mode .zone { cursor: pointer; transition: opacity 0.15s; }
      .hotspot-mode .zone:hover { opacity: 0.82; stroke: #005f9e; stroke-width: 3; }
      .hotspot-mode .zone:focus { outline: none; opacity: 0.82; stroke: #005f9e; stroke-width: 3; }
    </style>

    <!-- Diagonal hazard stripe pattern for body decal -->
    <pattern id="hazard-stripes" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="12" height="12" fill="#f0b323"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#111" stroke-width="5"/>
    </pattern>

    <!-- Mesh vent hatch pattern -->
    <pattern id="mesh-vent" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f0b323"/>
      <path d="M0 0 L8 8 M8 0 L0 8" stroke="#111" stroke-width="0.8" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- Neutral background -->
  <rect width="1400" height="780" fill="#e8eaed"/>

  <text class="title-text" x="28" y="36">Vermeer PD25R  side profile regions</text>
  <text class="subtitle-text" x="28" y="56">Each path has a unique id for hotspot / callout binding. Boundaries follow major color transitions.</text>

  <g id="pd25r-regions" aria-label="Machine color regions">

    <!-- PPP UNDER CARRIAGE PPP -->
    <g id="group-undercarriage" data-group="Undercarriage">

      <!-- Front (mast-side) track -->
      <path id="track-front"
            class="zone zone--track"
            data-component="Front crawler track"
            data-color="black"
            d="M 155 640
               L 195 628 L 480 612 L 535 618 L 548 648
               L 520 672 L 185 690 L 148 672 Z"/>

      <!-- Rear track -->
      <path id="track-rear"
            class="zone zone--track"
            data-component="Rear crawler track"
            data-color="black"
            d="M 560 618
               L 720 608 L 1145 618 L 1195 638 L 1205 668
               L 1160 688 L 555 678 L 545 648 Z"/>

      <!-- Black trim band above tracks (full width) -->
      <path id="body-bottom-trim"
            class="zone zone--black"
            data-component="Chassis bottom trim"
            data-color="black"
            d="M 340 598 L 1210 598 L 1210 628 L 340 628 Z"/>

      <!-- Wheel chock (orange in photo  small accent) -->
      <path id="wheel-chock"
            class="zone"
            data-component="Wheel chock"
            data-color="orange"
            fill="#e87722"
            d="M 1088 668 L 1118 668 L 1128 688 L 1078 688 Z"/>
    </g>

    <!-- PPP MAIN CHASSIS PPP -->
    <g id="group-chassis" data-group="Chassis / engine compartment">

      <!-- Primary yellow body shell -->
      <path id="body-main"
            class="zone zone--yellow"
            data-component="Main chassis body"
            data-color="yellow"
            d="M 348 598
               L 348 545
               L 420 520
               L 430 420
               L 455 395
               L 1020 370
               L 1048 385
               L 1055 598 Z"/>

      <!-- Sloped engine deck (yellow, distinct from vertical side) -->
      <path id="body-deck"
            class="zone zone--yellow"
            data-component="Sloped engine deck"
            data-color="yellow"
            d="M 455 395
               L 1020 370
               L 1005 340
               L 520 355
               L 455 375 Z"/>

      <!-- Black rear engine cover -->
      <path id="body-rear-cover"
            class="zone zone--black"
            data-component="Rear engine cover"
            data-color="black"
            d="M 1048 385
               L 1210 395
               L 1210 598
               L 1055 598
               L 1048 385 Z"/>

      <!-- Operator control panel (front face, black) -->
      <path id="control-panel"
            class="zone zone--black"
            data-component="Operator control panel"
            data-color="black"
            d="M 348 545
               L 348 455
               L 395 440
               L 420 445
               L 420 520 Z"/>

      <!-- Control screen (grey inset) -->
      <rect id="control-screen"
            class="zone zone--grey"
            data-component="Control display"
            data-color="grey"
            x="358" y="468" width="42" height="32" rx="2"/>

      <!-- E-stop button -->
      <circle id="control-estop"
              class="zone zone--red"
              data-component="Emergency stop"
              data-color="red"
              cx="378" cy="512" r="9"/>

      <!-- Lower mesh vent -->
      <rect id="vent-lower"
            class="zone zone--mesh"
            data-component="Engine vent  lower"
            data-color="yellow-mesh"
            x="720" y="490" width="95" height="58" rx="2"
            fill="url(#mesh-vent)"/>

      <!-- Upper mesh vent -->
      <rect id="vent-upper"
            class="zone zone--mesh"
            data-component="Engine vent  upper"
            data-color="yellow-mesh"
            x="720" y="418" width="95" height="58" rx="2"
            fill="url(#mesh-vent)"/>

      <!-- Diagonal hazard stripe decal -->
      <path id="decal-hazard-stripes"
            class="zone zone--stripe"
            data-component="Hazard stripe decal"
            data-color="black-yellow"
            fill="url(#hazard-stripes)"
            d="M 455 565 L 1020 565 L 1020 592 L 455 592 Z"/>

      <!-- PD25R model badge -->
      <rect id="decal-pd25r"
            class="zone zone--green"
            data-component="PD25R model badge"
            data-color="green"
            x="830" y="548" width="72" height="28" rx="2"/>
      <text class="zone-label" x="866" y="567" font-size="13">PD25R</text>

      <!-- Roof antenna / beacon mast -->
      <path id="roof-beacon"
            class="zone zone--black"
            data-component="Roof beacon / antenna"
            data-color="black"
            d="M 598 340 L 608 340 L 612 298 L 618 292 L 618 278
               L 588 278 L 588 292 L 594 298 Z"/>

      <!-- MB antenna bracket zone (left of mast, on deck) -->
      <path id="antenna-mb"
            class="zone zone--yellow"
            data-component="Moving Base antenna (MB)"
            data-color="yellow"
            stroke="#005f9e"
            stroke-width="2.5"
            stroke-dasharray="6 3"
            d="M 500 348 L 530 345 L 538 310 L 508 312 Z"/>
      <text class="zone-label zone-label--dark" x="519" y="332" font-size="10">MB</text>

      <!-- H heading antenna (rear deck) -->
      <path id="antenna-h"
            class="zone zone--yellow"
            data-component="Heading antenna (H)"
            data-color="yellow"
            stroke="#005f9e"
            stroke-width="2.5"
            stroke-dasharray="6 3"
            d="M 960 358 L 990 355 L 998 318 L 968 320 Z"/>
      <text class="zone-label zone-label--dark" x="979" y="340" font-size="10">H</text>
    </g>

    <!-- PPP MAST ASSEMBLY PPP -->
    <g id="group-mast" data-group="Mast &amp; hammer">

      <!-- Mast base / foot frame (yellow) -->
      <path id="mast-foot-frame"
            class="zone zone--yellow"
            data-component="Mast foot frame"
            data-color="yellow"
            d="M 330 598
               L 330 545
               L 370 530
               L 420 520
               L 420 598 Z"/>

      <!-- MF  mast foot reference zone -->
      <rect id="mast-foot-mf"
            class="zone zone--silver"
            data-component="Mast foot reference (MF)"
            data-color="silver"
            stroke="#005f9e"
            stroke-width="2.5"
            stroke-dasharray="6 3"
            x="355" y="568" width="48" height="22" rx="2"/>
      <text class="zone-label zone-label--dark" x="379" y="583" font-size="10">MF</text>

      <!-- Lower mast support arm (yellow structural) -->
      <path id="mast-support-lower"
            class="zone zone--yellow"
            data-component="Mast support arm  lower"
            data-color="yellow"
            d="M 370 530
               L 395 480
               L 418 485
               L 430 420
               L 455 395
               L 440 395
               L 425 460
               L 400 465 Z"/>

      <!-- Upper mast support arm -->
      <path id="mast-support-upper"
            class="zone zone--yellow"
            data-component="Mast support arm  upper"
            data-color="yellow"
            d="M 395 480
               L 448 360
               L 468 365
               L 418 485 Z"/>

      <!-- Left mast rail (yellow) -->
      <path id="mast-rail-left"
            class="zone zone--yellow"
            data-component="Mast rail  left"
            data-color="yellow"
            d="M 358 120
               L 378 120
               L 388 540
               L 368 540 Z"/>

      <!-- Right mast rail (yellow) -->
      <path id="mast-rail-right"
            class="zone zone--yellow"
            data-component="Mast rail  right"
            data-color="yellow"
            d="M 418 120
               L 438 120
               L 428 540
               L 408 540 Z"/>

      <!-- Center mast rail (black) -->
      <path id="mast-rail-center"
            class="zone zone--black"
            data-component="Mast center rail"
            data-color="black"
            d="M 388 115
               L 408 115
               L 408 545
               L 388 545 Z"/>

      <!-- Drive chain (silver/grey) -->
      <rect id="mast-chain"
            class="zone zone--silver"
            data-component="Mast drive chain"
            data-color="silver"
            x="393" y="130" width="10" height="400" rx="1"/>

      <!-- ML pivot reference -->
      <circle id="mast-pivot-ml"
              class="zone zone--silver"
              data-component="Mast left pivot (ML)"
              data-color="silver"
              stroke="#005f9e"
              stroke-width="2.5"
              stroke-dasharray="6 3"
              cx="375" cy="505" r="14"/>
      <text class="zone-label zone-label--dark" x="375" y="509" font-size="9">ML</text>

      <!-- MR pivot reference -->
      <circle id="mast-pivot-mr"
              class="zone zone--silver"
              data-component="Mast right pivot (MR)"
              data-color="silver"
              stroke="#005f9e"
              stroke-width="2.5"
              stroke-dasharray="6 3"
              cx="425" cy="505" r="14"/>
      <text class="zone-label zone-label--dark" x="425" y="509" font-size="9">MR</text>

      <!-- Hammer / drive head assembly (yellow) -->
      <path id="hammer-head"
            class="zone zone--yellow"
            data-component="Hammer drive head"
            data-color="yellow"
            d="M 335 310
               L 355 248
               L 390 235
               L 430 248
               L 448 290
               L 448 360
               L 430 395
               L 390 400
               L 355 385
               L 335 340 Z"/>

      <!-- HC  hammer center reference -->
      <circle id="hammer-center-hc"
              class="zone zone--silver"
              data-component="Hammer center (HC)"
              data-color="silver"
              stroke="#005f9e"
              stroke-width="2.5"
              stroke-dasharray="6 3"
              cx="392" cy="318" r="16"/>
      <text class="zone-label zone-label--dark" x="392" y="322" font-size="9">HC</text>

      <!-- Hammer face plate (silver) -->
      <rect id="hammer-face-plate"
            class="zone zone--silver"
            data-component="Hammer face plate"
            data-color="silver"
            x="340" y="295" width="18" height="48" rx="1"/>

      <!-- Red alignment guide strip -->
      <rect id="guide-strip-red"
            class="zone zone--red"
            data-component="Alignment guide strip"
            data-color="red"
            x="448" y="268" width="8" height="90" rx="1"/>
    </g>

    <!-- PPP HYDRAULICS PPP -->
    <g id="group-hydraulics" data-group="Hydraulic system">

      <!-- Upper hydraulic cylinder (yellow housing) -->
      <path id="hydraulic-cylinder-upper"
            class="zone zone--yellow"
            data-component="Hydraulic cylinder  upper"
            data-color="yellow"
            d="M 448 360
               L 555 395
               L 565 410
               L 460 380 Z"/>

      <!-- Upper cylinder rod (silver) -->
      <path id="hydraulic-rod-upper"
            class="zone zone--silver"
            data-component="Hydraulic rod  upper"
            data-color="silver"
            d="M 460 380
               L 555 410
               L 550 418
               L 455 388 Z"/>

      <!-- Lower hydraulic cylinder -->
      <path id="hydraulic-cylinder-lower"
            class="zone zone--yellow"
            data-component="Hydraulic cylinder  lower"
            data-color="yellow"
            d="M 430 420
               L 580 480
               L 590 498
               L 440 445 Z"/>

      <!-- Lower cylinder rod -->
      <path id="hydraulic-rod-lower"
            class="zone zone--silver"
            data-component="Hydraulic rod  lower"
            data-color="silver"
            d="M 440 445
               L 590 498
               L 585 508
               L 435 455 Z"/>

      <!-- Hydraulic hoses to hammer -->
      <path id="hose-bundle-1"
            class="zone zone--hose"
            data-component="Hydraulic hoses  upper"
            data-color="black"
            fill="none"
            stroke="#111"
            stroke-width="10"
            stroke-linecap="round"
            d="M 448 300 Q 510 280 560 350 Q 590 390 600 420"/>

      <path id="hose-bundle-2"
            class="zone zone--hose"
            data-component="Hydraulic hoses  lower"
            data-color="black"
            fill="none"
            stroke="#111"
            stroke-width="10"
            stroke-linecap="round"
            d="M 448 350 Q 520 370 580 440 Q 610 470 620 490"/>
    </g>
  </g>

  <!-- Legend -->
  <g id="legend" transform="translate(28, 700)">
    <rect x="0" y="0" width="1344" height="58" fill="#fff" stroke="#9ca3af" rx="6"/>
    <text class="subtitle-text" x="14" y="22" font-weight="600" fill="#252a2e">Legend</text>
    <rect x="14" y="32" width="14" height="14" class="zone--yellow" stroke="#111" stroke-width="1"/>
    <text class="subtitle-text" x="34" y="44">Yellow body / structure</text>
    <rect x="160" y="32" width="14" height="14" class="zone--black" stroke="#111" stroke-width="1"/>
    <text class="subtitle-text" x="180" y="44">Black panels / trim</text>
    <rect x="310" y="32" width="14" height="14" class="zone--track" stroke="#111" stroke-width="1"/>
    <text class="subtitle-text" x="330" y="44">Tracks</text>
    <rect x="400" y="32" width="14" height="14" class="zone--silver" stroke="#111" stroke-width="1"/>
    <text class="subtitle-text" x="420" y="44">Metal / reference points</text>
    <rect x="570" y="32" width="14" height="14" fill="none" stroke="#005f9e" stroke-width="2" stroke-dasharray="4 2"/>
    <text class="subtitle-text" x="590" y="44">Survey reference zones (MB, H, ML, MR, MF, HC)</text>
    <text class="subtitle-text" x="900" y="44">Add class="hotspot-mode" on &lt;svg&gt; for hover highlight</text>
  </g>
</svg>
