<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" role="img" aria-label="Circle play check">
  <defs>
    <style>
      .ink { fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
